parameters:
#    odr_open_repository_user.example.class: ODR\OpenRepository\UserBundle\Example

services:

    # Registered as a service (controller.service_arguments) so Symfony resolves it from the
    # container instead of auto-injecting the whole container (deprecated in 4.2, removed in 5.0).
    ODR\OpenRepository\UserBundle\Controller\UtilityController:
        public: true
        arguments:
            $tracked_path_service: '@odr.tracked_path_service'
            $router: '@router'
            $search_key_service: '@odr.search_key_service'
            $theme_info_service: '@odr.theme_info_service'
            $site_baseurl: '%site_baseurl%'
        tags: ['controller.service_arguments']

    odr.tracked_path_service:
        public: true
        class: ODR\OpenRepository\UserBundle\Component\Service\TrackedPathService
        arguments:
            $requestStack: "@request_stack"


    # --- Native auth services (replace FOSUserBundle) ---

    # Replacement for fos_user.user_manager. Aliased to the old id so ~50 existing call sites
    # ($this->container->get('fos_user.user_manager')->...) keep working unchanged.
    odr.user_manager:
        public: true
        class: ODR\OpenRepository\UserBundle\Component\Service\ODRUserManager
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $password_encoder: '@security.user_password_hasher'
    fos_user.user_manager:
        alias: odr.user_manager
        public: true

    # Replacement for fos_user.util.token_generator (used for misc random tokens, not just resets).
    odr.token_generator:
        public: true
        class: ODR\OpenRepository\UserBundle\Component\Service\ODRTokenGenerator
    fos_user.util.token_generator:
        alias: odr.token_generator
        public: true

    # Login form controller (login_check/logout are handled by the firewall)
    ODR\OpenRepository\UserBundle\Controller\SecurityController:
        public: true
        arguments:
            $twig: '@twig'
            $authenticationUtils: '@security.authentication_utils'
            $csrfTokenManager: '@security.csrf.token_manager'
        tags: ['controller.service_arguments']

    # Password-reset flow controller
    ODR\OpenRepository\UserBundle\Controller\ResettingController:
        public: true
        arguments:
            $twig: '@twig'
            $user_manager: '@odr.user_manager'
            $token_generator: '@odr.token_generator'
            $mailer: '@mailer'
            $router: '@router'
            $form_factory: '@form.factory'
            $token_storage: '@security.token_storage'
            $site_baseurl: '%site_baseurl%'
            $from_email: '%mailer_user%'
            $reset_token_ttl: 86400
        tags: ['controller.service_arguments']
