# FOSUserBundle - Allows users to resend a password reset email
fos_user_resetting_resend_email:
    path:  /resetting/resend-email   # needs to have the same prefix as the fos_user_resetting resource in /app/config/routing.yml
    defaults: { _controller: ODR\OpenRepository\UserBundle\Controller\ResettingController::resendAction }
    requirements: { methods: POST }

# Utility routes to seamlessly redirect to the initial page...only an issue because HWIOAuthBundle hijacks the entire login flow when it's used
odr_save_url:
    path:  /save_url
    defaults: { _controller: ODR\OpenRepository\UserBundle\Controller\UtilityController::saveurlAction }

odr_save_fragment:
    path:  /save_fragment
    defaults: { _controller: ODR\OpenRepository\UserBundle\Controller\UtilityController::savefragmentAction }

odr_redirect:
    path:  /redirect
    defaults: { _controller: ODR\OpenRepository\UserBundle\Controller\UtilityController::redirectAction }
