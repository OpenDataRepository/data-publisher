odr_statistics_dashboard:
  path: /statistics/dashboard/{datatype_id}
  defaults: { _controller: ODR\AdminBundle\Controller\StatisticsController::getDashboardAction }
  methods: [ GET ]
  requirements:
    datatype_id: '\d+'

odr_statistics_admin_dashboard:
  path: /statistics/dashboard
  defaults: { _controller: ODR\AdminBundle\Controller\StatisticsController::adminDashboardAction }
  methods: [ GET ]

odr_statistics_summary:
