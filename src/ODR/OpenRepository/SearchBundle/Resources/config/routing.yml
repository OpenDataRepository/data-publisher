  methods: [ POST ]

odr_statistics_log_download:
  path: /statistics/log_download
  defaults: { _controller: ODR\AdminBundle\Controller\StatisticsController::logDownloadAction, _format: json }
  methods: [ POST ]

odr_statistics_get_datatype:
  path: /statistics/datatype/{datatype_id}
  defaults: { _controller: ODR\AdminBundle\Controller\StatisticsController::getDatatypeStatsAction, _format: json }
  methods: [ GET ]
  requirements:
    datatype_id: '\d+'

odr_statistics_get_datarecord:
  path: /statistics/datarecord/{datarecord_id}
  defaults: { _controller: ODR\AdminBundle\Controller\StatisticsController::getDatarecordStatsAction, _format: json }
