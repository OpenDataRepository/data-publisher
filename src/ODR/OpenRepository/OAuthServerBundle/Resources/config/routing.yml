# FOSOAuthBundle - server side oauth login routes
odr_oauth_server_auth_login:
    path:  /oauth/v2/auth_login
    defaults: { _controller: ODR\OpenRepository\OAuthServerBundle\Controller\SecurityController::oauthloginAction }

odr_oauth_server_auth_login_check:
    path:  /oauth/v2/auth_login_check
    defaults: { _controller: ODR\OpenRepository\OAuthServerBundle\Controller\SecurityController::oauthloginCheckAction }
    requirements: { methods: POST }

# user management of OAuth Clients
odr_create_oauth_client:
    path:  /profile/oauth_client/create
    defaults: { _controller: ODR\OpenRepository\OAuthServerBundle\Controller\ClientController::createOAuthClientAction }

odr_delete_oauth_client:
    path:  /profile/oauth_client/delete
    defaults: { _controller: ODR\OpenRepository\OAuthServerBundle\Controller\ClientController::deleteOAuthClientAction }
