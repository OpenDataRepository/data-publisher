#-----------------------------------------
# Bridge Controller
odr_jupyterhub_app_list:
    path: /admin/jupyterhub/app_list/{datatype_id}
    defaults: { _controller: ODR\OpenRepository\JupyterhubBridgeBundle\Controller\BridgeController::applistAction }
    requirements:
        datatype_id: \d+

odr_jupyterhub_export:
    path: /admin/jupyterhub/export
    defaults: { _controller: ODR\OpenRepository\JupyterhubBridgeBundle\Controller\BridgeController::jupyterhubexportAction }
    requirements: { methods: POST }

odr_jupyter_hub_shutdown:
    path: /admin/jupyterhub/shutdown
    defaults: { _controller: ODR\OpenRepository\JupyterhubBridgeBundle\Controller\BridgeController::hubshutdownAction }
