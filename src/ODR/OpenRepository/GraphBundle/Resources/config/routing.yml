#-----------------------------------------
# Graph Controller
odr_plugin_graph_render:
    path:  /graph/static/{request_datatype_id}/{request_datarecord_id}.{_format}
    defaults: { _controller: ODR\OpenRepository\GraphBundle\Controller\GraphController::renderAction, _format: 'svg' }
    requirements:
        request_datatype_id: \d+
        request_datarecord_id: '(rollup_)?\d+'  # sequence of digits, optionally with 'rollup_' in front of it

odr_plugin_graph_delete_individual:
    path:  /edit/plugins/delete_individual_graph/{datatype_id}/{graph_filename}
    defaults: { _controller: ODR\OpenRepository\GraphBundle\Controller\GraphController::deleteindividualgraphAction }
    requirements:
        datatype_id: \d+
        graph_filename: '^0|(Filter_)?Chart_[ad]_[a-f0-9]{40}_\d+\.svg$'

odr_plugin_graph_save_xaxisdir:
    path:  /view/plugins/savexaxisdir/{direction}/{render_plugin_instance_id}
    defaults: { _controller: ODR\OpenRepository\GraphBundle\Controller\GraphController::savexaxisdirAction }
    requirements:
        direction: '|asc|desc'
        render_plugin_instance_id: \d+

