    # Console commands. Symfony 4 removed auto-registration of a bundle's
    # Command/ directory, so the legacy ContainerAwareCommand classes must be
    # registered explicitly as services tagged console.command.
    ODR\AdminBundle\Command\:
        resource: '../../Command/'
        public: true
        tags: ['console.command']
        # ContainerAwareCommand was removed in Symfony 5; ODR's base class restores getContainer()
        # from the full container injected here.
        calls:
            - [setContainer, ['@service_container']]

    odr.twig.plug_extension:
